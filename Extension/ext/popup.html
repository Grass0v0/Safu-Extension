<!DOCTYPE html>
<html>
<head>
  <title>Domain Filter</title>
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .feature-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
    }
    .feature-label {
      font-size: 14px;
      color: #333;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #2196F3;
    }
    input:checked + .slider:before {
      transform: translateX(16px);
    }
    button {
      padding: 8px 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 10px;
      width: 100%;
    }
    button:hover {
      background-color: #45a049;
    }
    h2 {
      margin: 0 0 15px 0;
      font-size: 18px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Safu Extension</h2>
    
    <div class="feature-row">
      <span class="feature-label">Domain Blacklist Protection</span>
      <label class="switch">
        <input type="checkbox" id="extension-toggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="feature-row">
      <span class="feature-label">Phishing Protection</span>
      <label class="switch">
        <input type="checkbox" id="phishing-toggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="feature-row">
      <span class="feature-label">Community Defense</span>
      <label class="switch">
        <input type="checkbox" id="community-toggle">
        <span class="slider"></span>
      </label>
    </div>

    <button id="dashboard-btn">Dashboard</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
